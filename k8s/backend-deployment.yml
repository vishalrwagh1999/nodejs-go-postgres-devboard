apiVersion: apps/v1
kind: Deployment
metadata:
  name:  devboard-backend-deployment
  namespace: devboard
  labels:
    app:  devboard-backend
spec:
  selector:
    matchLabels:
      app: devboard-backend
  replicas: 1
  # strategy:
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%
  #   type: RollingUpdate
  template:
    metadata:
      labels:
        app:  devboard-backend
    spec:
      containers:
      - name: devboard-backend
        image: vishaldocker85/devboard-backend:latest
        ports:
          - containerPort: 8080
