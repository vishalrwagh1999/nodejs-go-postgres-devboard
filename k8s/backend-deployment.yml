apiVersion: apps/v1
kind: Deployment
metadata:
  name:  devboard-backend-deployment
  namespace: devboard
  labels:
    app:  devboard-backend
spec:
  selector:
    matchLabels:
      app: devboard-backend
  replicas: 1
  # strategy:
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%
  #   type: RollingUpdate
  template:
    metadata:
      labels:
        app:  devboard-backend
    spec:
      containers:
      - name: devboard-backend
        image: vishaldocker85/devboard-backend:latest
        ports:
          - containerPort: 8080
        env:
            - name: POSTGRES_DB            # Name inside the container
              valueFrom:
                secretKeyRef:
                  name: devboard-secrets                # Name of your Secret file meta
                  key: POSTGRES_DB                      # Key inside the Secret

            - name: POSTGRES_PASSWORD      # Name inside the container
              valueFrom:
                secretKeyRef:
                  name: devboard-secrets                # Name of your Secret file meta
                  key: POSTGRES_PASSWORD                # Key inside the Secret

            - name: POSTGRES_USER          # Name inside the container 
              valueFrom:  
                configMapKeyRef:
                  name: devboard-configmap              # Name of your ConfigMap file meta
                  key: POSTGRES_USER                    # Key inside the ConfigMap
            
            - name: POSTGRES_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable

            - name: PORT #BACKEND_PORT
              value: "8080" # or we can add this in config map as well. and use conggMapKeyRef block.
                

