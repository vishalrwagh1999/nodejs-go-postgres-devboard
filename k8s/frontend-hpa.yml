apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devboard-frontend-hpa
  namespace: devboard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devboard-frontend-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10