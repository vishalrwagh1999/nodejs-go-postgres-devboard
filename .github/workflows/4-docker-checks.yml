# This file will scan the docker linting (hadoLint) - build the image - trivy scans the image

name: Docker Checks

on:
    workflow_call:

jobs:
    docker-checks:
        runs-on: ubuntu-latest        
        strategy:
            matrix: 
                folders: [frontend ,backend]
        steps:
            - name: checkout the code
              uses: actions/checkout@v4

            - name: Lint Dockerfile for ${{ matrix.folders }}
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ${{ matrix.folders }}/Dockerfile

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            #- name: Login to ACR                               gitlab ci                   github                                  aws ecr
            #  uses: docker/login-action@v4
            #  with:
            #    registry: <registry-name>.azurecr.io   registry: registry.gitlab.com   registry: ghcr.io                       registry: <aws-account-number>.dkr.ecr.<region>.amazonaws.com
            #    username: ${{ vars.AZURE_CLIENT_ID }}                                 username: ${{ github.actor }}           username: ${{ vars.AWS_ACCESS_KEY_ID }}
            #    password: ${{ secrets.AZURE_CLIENT_SECRET }}                          password: ${{ secrets.GITHUB_TOKEN }}    password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            - name: Docker Build ${{ matrix.folders }}
              run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders }}:${{ github.sha }} .
            # run: docker build -t docker.io/my-organization/my-app:${{ github.sha }} .
              working-directory: ${{ matrix.folders }}

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders }}:${{ github.sha }}
                format: 'table'
                exit-code: '0' #1 if nay critical fail the pipeline
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL' #'CRITICAL,HIGH'
                #trivyignores: .trivyignore    # frontend/.trivyignore, backend/.trivyignore): Trivy is looking at the root and missing them.
                #trivyignores: ${{ github.workspace }}/.trivyignore # ERROR: cannot find ignorefile '/home/runner/work/nodejs-go-postgres-devboard/nodejs-go-postgres-devboard/.trivyignore'.

