#this will check the dependecy in yaml for nodejs and go lang

name: dependency chek

on:
    workflow_call:

jobs:
    dependency-check:
        runs-on: ubuntu-latest
        steps:

            - name: checkout the code
              uses: actions/checkout@v7

            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run NPM Audit
              run: npm audit --audit-level=high  #only high level it will capture   # run: npm audit
              working-directory: frontend
            
            - name: Upload Report to Artifacts
              if: always() # Ensures report uploads even if tests fail
              uses: actions/upload-artifact@v7
              with:
                name: dependency-scan-report
                path: reports/dependency-report.txt
                retention-days: 5

            
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.23'
                  go-version-file: 'go.mod'
                  cache-dependency-path: go.sum
                  cache: true # Speeds up execution by caching go modules #by defaukt its true

            - name: Run Govulncheck
              uses: golang/govulncheck-action@v1
              with:
                go-package: ./... # Scans all packages in the repository recursively
                output-format: text #by default
                output-file: govulncheck-report.txt # need to add report where it should be generated.
            # or above step
            #- name: GoVulncheck
            #  continue-on-error: true
            #  run: govulncheck ./... > govulncheck-report.txt
            #  working-directory: backend

            - name: Upload Scan Report
              uses: actions/upload-artifact@v7
              with:
                name: govulncheck-findings
                path: reports/govulncheck-report.txt
                retention-days: 5 # 1 to 90 days only. change setting if need for more.

