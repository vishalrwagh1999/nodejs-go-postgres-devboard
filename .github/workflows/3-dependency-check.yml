#this will check the dependecy in yaml for nodejs and go lang

name: Dependency Check

on:
    workflow_call:

jobs:
    dependency-check:
        runs-on: ubuntu-latest
        timeout-minutes: 15  # kills job if it hangs, prevents wasted runner minutes
        permissions:
            contents: read   # least privilege - only needs to read code
            actions: read    # needed for uploading artifacts
        steps:

            - name: checkout the code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 - SHA pinned for supply chain security

            - name: Setup NodeJs
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0 - SHA pinned
              with:
                node-version: '24' #20
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run NPM Audit
              # --audit-level=high fails pipeline on high/critical vulnerabilities
              # tee saves report to file AND shows output in logs
              run: |
                mkdir -p ../reports
                npm audit --audit-level=high 2>&1 | tee ../reports/dependency-report.txt
              working-directory: frontend

            - name: Upload NPM Audit Report
              if: always() # Ensures report uploads even if audit fails
              uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0 - SHA pinned
              with:
                name: dependency-scan-report
                path: reports/dependency-report.txt
                retention-days: 5

            - name: Setup Go
              uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0 - SHA pinned
              with:
                  go-version-file: 'backend/go.mod'
                  cache-dependency-path: backend/go.sum
                  cache: true # Speeds up execution by caching go modules #by default its true

            #- name: Run Govulncheck
            #  uses: golang/govulncheck-action@v1
            #  with:
            #    repo-checkout: false     # disable internal checkout, we already did it in first step
            #    work-dir: backend        # fixed: was 'path' which is not a valid input
            #    go-package: ./...        # Scans all packages in the repository recursively
            #    output-format: text      #by default
            #    output-file: govulncheck-report.txt # need to add report where it should be generated.
            # or above step

            # Fixed: Added CLI installation step so govulncheck tool exists on the runner
            - name: Install Govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4  # pinned version, @latest can break anytime

            - name: GoVulncheck
              # exit code 3 means vulnerabilities found - fails pipeline intentionally in production
              # remove continue-on-error so critical CVEs block the pipeline
              run: govulncheck ./... > govulncheck-report.txt 2>&1  # capture both stdout and stderr
              working-directory: backend

            - name: Upload Govulncheck Report
              if: always() # upload report even if govulncheck found vulnerabilities
              uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0 - SHA pinned
              with:
                name: govulncheck-findings
                path: backend/govulncheck-report.txt
                retention-days: 5 # 1 to 90 days only. change setting if need for more.
