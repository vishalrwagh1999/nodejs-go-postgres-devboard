#this will check the dependecy in yaml for nodejs and go lang

name: Dependency Check

on:
    workflow_call:

jobs:
    dependency-check:
        runs-on: ubuntu-latest
        steps:

            - name: checkout the code
              uses: actions/checkout@v4

            - name: Setup NodeJs
              uses: actions/setup-node@v4
              with:
                node-version: '24' #20
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run NPM Audit
              # Fixed: Added directory creation and output redirection to create the file, added || true so the workflow doesn't break before saving the report
              run: |
                mkdir -p ../reports
                npm audit > ../reports/dependency-report.txt || true #npm audit --audit-level=high  #only high level it will capture   # run: npm audit
              working-directory: frontend
            
            - name: Upload Report to Artifacts
              if: always() # Ensures report uploads even if tests fail
              uses: actions/upload-artifact@v4 # Fixed: Downgraded from v7 to standard v4
              with:
                name: dependency-scan-report
                path: reports/dependency-report.txt
                retention-days: 5

            
            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: 'backend/go.mod'
                  cache-dependency-path: backend/go.sum
                  cache: true # Speeds up execution by caching go modules #by default its true

            #- name: Run Govulncheck
            #  uses: golang/govulncheck-action@v1
            #  with:
            #    repo-checkout: false     # disable internal checkout, we already did it in first step
            #    work-dir: backend        # fixed: was 'path' which is not a valid input
            #    go-package: ./...        # Scans all packages in the repository recursively
            #    output-format: text      #by default
            #    output-file: govulncheck-report.txt # need to add report where it should be generated.
            # or above step
            
            # Fixed: Added CLI installation step so govulncheck tool exists on the runner
            - name: Install Govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: GoVulncheck
              continue-on-error: true
              run: govulncheck ./... > govulncheck-report.txt
              working-directory: backend

            - name: Upload Govulncheck Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: govulncheck-findings
                path: backend/govulncheck-report.txt
                retention-days: 5 # 1 to 90 days only. change setting if need for more.
