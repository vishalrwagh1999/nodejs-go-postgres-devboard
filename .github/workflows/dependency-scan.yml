# Goal - I have to ensure the packages & dependencies have been audited for Security

name: Dependecy scan

on:
    workflow_call:

jobs:
    dependency-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: 1.22
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum

            - name: Install Govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

            - name: GoVulncheck
              continue-on-error: true
              run: govulncheck ./... > govulncheck-report.txt
              working-directory: backend

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run Dependency Scan for Node
              run: npm audit
              working-directory: frontend

            - name: Upload Report to Artifacts
              if: always() # Ensures report uploads even if tests fail
              uses: actions/upload-artifact@v4
              with:
                name: dependency-scan-report
                path: reports/dependency-report.txt
                retention-days: 5
